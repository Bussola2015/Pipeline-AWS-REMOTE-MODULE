name: "Terraform PR Workflow"

# esse bloco define os gatilhos para o workflow, nesse caso, ele será executado em push para a branch main ou pull request
# esse bloco "ouvi" tanto push quanto PR 
on:
  push:
    branches:
      - main-pr
  pull_request: 
    branches:
      - main-pr  # O pipeline de PR só dispara se o alvo do PR for a main-pr
jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash

    env:
      # Define o diretório onde o seu código realmente está
      WORKING_DIR: ./environments/dev-pr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Format   #fmt
        # Removido o -check para não travar o pipeline por estética
        run: terraform fmt -recursive
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Format Check
        run: terraform fmt -check    # Verifica se o código está formatado corretamente, senaõ tiver falha a pipeline | fmt -check -recursive
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Plan
        run: terraform plan -var="admin_ip=${{ secrets.MY_PERSONAL_IP }}" -var-file="terraform.tfvars" -no-color
        working-directory: ${{ env.WORKING_DIR }}

      # O APPLY só roda se for um PUSH na MAIN (ou seja, após o Merge do PR)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main-pr' && github.event_name == 'push'
        run: terraform apply -var="admin_ip=${{ secrets.MY_PERSONAL_IP }}" -var-file="terraform.tfvars" -auto-approve
        working-directory: ${{ env.WORKING_DIR }}

      # O ARTIFACT da chave também só faz sentido no Apply
      - name: Upload SSH Key
        if: github.ref == 'refs/heads/main-pr' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ssh-key-debian
          path: ${{ env.WORKING_DIR }}/aws-key-dev.pem