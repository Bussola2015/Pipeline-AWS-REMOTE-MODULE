name: "Terraform Plan"

# esse bloco define os gatilhos para o workflow, nesse caso, ele será executado em push para a branch main ou pull request
# esse bloco "ouvi" tanto push quanto PR 
on:
  push:
    branches:
      - main
    paths:
      - 'environments/dev/**' # Essencial: só roda se mudar o P1
  pull_request:    #se eu quiser rodar o workflow em PR, eu preciso definir o evento pull_request, e nesse caso, ele vai rodar para qualquer PR que tenha mudanças no diretório 'environments/dev/**'
    branches:
      - main
    paths:
      - 'environments/dev/**' 

jobs:
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash

    env:
      # Define o diretório onde o seu código realmente está
      WORKING_DIR: ./environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Format
        # Removido o -check para não travar o pipeline por estética
        run: terraform fmt -recursive
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Plan
        run: terraform plan -var="admin_ip=${{ secrets.MY_PERSONAL_IP }}" -var-file="terraform.tfvars" -no-color
        working-directory: ${{ env.WORKING_DIR }}

      # O APPLY roda Manualmente, para evitar mudanças acidentais na infraestrutura, mas você pode descomentar esse bloco para automatizar o Apply após o Merge do PR

      
