name: "Terraform Manual Apply"

on:
  workflow_dispatch: # Ativa o botão manual

jobs:
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-22.04
    env:
      WORKING_DIR: ./environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -var="admin_ip=${{ secrets.MY_PERSONAL_IP }}" -var-file="terraform.tfvars" -auto-approve
        working-directory: ${{ env.WORKING_DIR }}

      - name: Upload SSH Key
        uses: actions/upload-artifact@v4
        with:
          name: ssh-key-debian
          path: ${{ env.WORKING_DIR }}/aws-key-dev.pem